name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "src\ProdToy.Win\Core\AppVersion.cs" -Raw
          if ($content -match 'Current\s*=\s*"(\d+\.\d+\.\d+)"') {
            $version = $Matches[1]
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not parse version"
            exit 1
          }

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: dotnet publish -c Release src/ProdToy.Win

      - name: Create Release
        if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: ProdToy v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: release/ProdToy.exe
